<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>ShapR Tabler Icons</title>

  <!-- Office.js — must load before any add-in logic -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <!-- JSZip — lightweight PPTX theme extraction -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js" type="text/javascript"></script>

  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       OFFICE NOT AVAILABLE BANNER
       Shown when opened outside PowerPoint
  ═══════════════════════════════════════════════ -->
  <div id="office-warning" class="office-warning hidden" role="alert" aria-live="polite">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span>Open this add-in inside PowerPoint to insert icons into slides.</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════ -->
  <header class="app-header" role="banner">
    <div class="header-brand">
      <div class="brand-logo" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <span class="brand-name">ShapR Icons</span>
    </div>
    <div class="header-meta">
      <span id="icon-count" class="icon-count" aria-live="polite" aria-label="Icon count">Loading...</span>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════
       CONTROLS PANEL
  ═══════════════════════════════════════════════ -->
  <section class="controls-panel" aria-label="Icon options">

    <!-- Search -->
    <div class="search-wrapper" role="search">
      <label for="search-input" class="sr-only">Search icons by name</label>
      <div class="search-input-group">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="search-input"
          type="search"
          class="search-input"
          placeholder="Search 5,000+ icons..."
          autocomplete="off"
          spellcheck="false"
          aria-label="Search icons"
        />
        <button
          id="search-clear"
          class="search-clear hidden"
          type="button"
          aria-label="Clear search"
          title="Clear search"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Color swatches (populated dynamically from Office theme or defaults) -->
    <div class="option-row option-row--color">
      <span class="option-label" id="color-label">Color</span>
      <div class="color-controls">
        <div class="color-swatches" id="color-swatches" role="radiogroup" aria-labelledby="color-label">
          <!-- JS populates swatches from Office theme or DEFAULT_COLORS -->
        </div>
        <label class="color-picker-btn" title="Custom color">
          <input type="color" id="color-picker" value="#000000" class="sr-only" aria-label="Pick a custom color" />
          <span class="swatch swatch--picker" aria-label="Custom color picker">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2" x2="12" y2="4"/>
              <line x1="12" y1="20" x2="12" y2="22"/>
              <line x1="2" y1="12" x2="4" y2="12"/>
              <line x1="20" y1="12" x2="22" y2="12"/>
            </svg>
          </span>
        </label>
      </div>
    </div>
    <div class="option-row option-row--hex">
      <span class="option-label">&nbsp;</span>
      <div class="hex-input-group">
        <span class="hex-prefix">#</span>
        <input type="text" id="hex-input" class="hex-input"
               maxlength="6" placeholder="000000" spellcheck="false"
               aria-label="Hex color code" />
      </div>
    </div>

    <!-- Size selector -->
    <div class="option-row">
      <span class="option-label" id="size-label">Size</span>
      <div class="size-buttons" role="radiogroup" aria-labelledby="size-label">
        <label class="size-label-wrapper">
          <input type="radio" name="icon-size" value="32" class="sr-only" />
          <span class="size-btn" aria-label="Small, 32 pixels">S</span>
        </label>
        <label class="size-label-wrapper">
          <input type="radio" name="icon-size" value="64" checked class="sr-only" />
          <span class="size-btn size-btn--active" aria-label="Medium, 64 pixels">M</span>
        </label>
        <label class="size-label-wrapper">
          <input type="radio" name="icon-size" value="96" class="sr-only" />
          <span class="size-btn" aria-label="Large, 96 pixels">L</span>
        </label>
      </div>
      <span class="size-display" id="size-display" aria-live="polite">3 cm</span>
    </div>

  </section>

  <!-- ═══════════════════════════════════════════════
       LOADING STATE
  ═══════════════════════════════════════════════ -->
  <div id="loading-state" class="loading-state" role="status" aria-label="Loading icons">
    <div class="skeleton-grid" aria-hidden="true">
      <!-- Skeleton cards generated by JS, shown as placeholder -->
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
    <p class="loading-message">Loading Tabler Icons sprite...</p>
  </div>

  <!-- ═══════════════════════════════════════════════
       ERROR STATE
  ═══════════════════════════════════════════════ -->
  <div id="error-state" class="error-state hidden" role="alert">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <p class="error-title">Failed to load icons</p>
    <p class="error-detail" id="error-detail">Could not fetch the Tabler Icons sprite.</p>
    <button id="retry-btn" class="retry-btn" type="button">Try again</button>
  </div>

  <!-- ═══════════════════════════════════════════════
       EMPTY SEARCH STATE
  ═══════════════════════════════════════════════ -->
  <div id="empty-state" class="empty-state hidden" role="status" aria-live="polite">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
    <p class="empty-title">No icons found</p>
    <p class="empty-detail">Try a different search term.</p>
  </div>

  <!-- ═══════════════════════════════════════════════
       ICON GRID (virtual scroll container)
  ═══════════════════════════════════════════════ -->
  <main id="grid-container" class="grid-container hidden" aria-label="Icon grid">
    <!-- Virtual scroll sentinel — total height spacer -->
    <div id="grid-spacer" class="grid-spacer" aria-hidden="true"></div>
    <!-- Rendered icon cards injected here -->
    <div id="grid-viewport" class="grid-viewport" role="list" aria-label="Icons"></div>
  </main>

  <!-- ═══════════════════════════════════════════════
       INSERT TOAST NOTIFICATION
  ═══════════════════════════════════════════════ -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- ═══════════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════════ -->
  <footer class="app-footer" role="contentinfo">
    <span id="result-count" class="result-count" aria-live="polite"></span>
    <span class="footer-brand">
      Powered by <a href="https://tabler.io/icons" target="_blank" rel="noopener noreferrer">Tabler Icons</a>
    </span>
  </footer>

  <script src="taskpane.js"></script>
</body>
</html>
