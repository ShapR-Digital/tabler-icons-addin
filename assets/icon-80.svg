  <line x1="17" y1="60" x2="27" y2="60" stroke="#30A5BF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="49" y1="56" x2="63" y2="56" stroke="#30A5BF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
