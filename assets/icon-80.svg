      <stop offset="0%" stop-color="#185359"/>
      <stop offset="100%" stop-color="#30A5BF"/>
    </linearGradient>
    <filter id="shadow80" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(48,165,191,0.3)"/>
